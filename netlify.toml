[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Cache the heavy stuff aggressively (images + JSON manifest are immutable per release)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    # Files aren't content-hashed in their paths, so we MUST revalidate on
    # every load — otherwise browsers cache stale code forever after deploys.
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# HTML pages must also revalidate so meta-tag changes (OG image, mint
# button copy) reach users without a hard refresh.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Pretty URLs
[[redirects]]
  from = "/play"
  to = "/play.html"
  status = 200

[[redirects]]
  from = "/match"
  to = "/match.html"
  status = 200
