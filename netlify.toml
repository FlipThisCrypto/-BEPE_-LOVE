[build]
  publish = "."
  command = ""

# Cache the heavy stuff aggressively (images + JSON manifest are immutable per release)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pretty URLs for play page
[[redirects]]
  from = "/play"
  to = "/play.html"
  status = 200
